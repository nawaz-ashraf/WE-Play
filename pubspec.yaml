name: we_play
description: WE PLAY — Gen-Z hyper-casual multi-game platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Game Engine
  flame: ^1.17.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0

  # Auth
  google_sign_in: ^6.2.1

  # Ads
  google_mobile_ads: ^5.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Sharing
  share_plus: ^9.0.0

  # Fonts
  google_fonts: ^6.2.1

  # Images
  cached_network_image: ^3.3.1

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
